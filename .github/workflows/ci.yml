name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  backend-syntax:
    name: Backend — Syntax (17 files)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: cd backend && pip install -r requirements.txt -q
      - name: Compile all Python files
        run: |
          cd backend
          python -m py_compile \
            main.py \
            core/mistral_client.py core/vector_db.py core/state.py \
            core/orchestrator.py core/database.py core/auth.py core/logging_config.py \
            agents/feature_agent.py agents/security_agent.py \
            agents/dependency_agent.py agents/research_agent.py \
            agents/test_runner.py agents/deployment_agent.py \
            api/routes.py api/auth_routes.py gitlab/client.py
          echo "All 17 files compile cleanly"

  backend-test:
    name: Backend — Tests (61)
    runs-on: ubuntu-latest
    needs: backend-syntax
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: cd backend && pip install -r requirements.txt httpx -q
      - name: Run full test suite
        run: cd backend && python -m pytest tests/ -v --tb=short
        env:
          DEMO_MODE: "true"
          GITLAB_MOCK: "true"
          ALLOWED_ORIGINS: "http://localhost:3000"
          DATABASE_URL: "sqlite:///./test_autodev.db"
          JWT_SECRET_KEY: "ci-test-secret-key-32-chars-minimum!!"
          JWT_EXPIRE_MINUTES: "60"
          DEFAULT_ADMIN_PASSWORD: "TestPass123!"
          LOG_LEVEL: "ERROR"

  frontend-build:
    name: Frontend — Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json
      - run: cd frontend && npm install --legacy-peer-deps
      - run: cd frontend && npm run build
        env:
          VITE_API_URL: http://localhost:8000/api
