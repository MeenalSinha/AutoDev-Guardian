name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Syntax check (always passes — no network, no imports) ───────────
  backend-syntax:
    name: Backend — Syntax (17 files)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile all Python source files
        run: |
          python -m py_compile \
            backend/main.py \
            backend/core/mistral_client.py \
            backend/core/vector_db.py \
            backend/core/state.py \
            backend/core/orchestrator.py \
            backend/core/database.py \
            backend/core/auth.py \
            backend/core/logging_config.py \
            backend/core/reasoning.py \
            backend/agents/feature_agent.py \
            backend/agents/security_agent.py \
            backend/agents/dependency_agent.py \
            backend/agents/research_agent.py \
            backend/agents/test_runner.py \
            backend/agents/deployment_agent.py \
            backend/api/routes.py \
            backend/api/auth_routes.py
          echo "All 17 files compile cleanly"

  # ── Job 2: Core unit tests (no network, no httpx, no TestClient) ───────────
  backend-tests:
    name: Backend — Tests (offline)
    runs-on: ubuntu-latest
    needs: backend-syntax
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies (pinned httpx)
        run: |
          pip install -r backend/requirements.txt \
            "httpx==0.27.2" \
            "starlette==0.36.3" \
            --quiet

      - name: Run offline unit tests
        working-directory: backend
        run: |
          python -m pytest tests/test_offline.py -v --tb=short
        env:
          DEMO_MODE: "true"
          GITLAB_MOCK: "true"
          DATABASE_URL: "sqlite:///./test_ci.db"
          JWT_SECRET_KEY: "ci-secret-key-minimum-32-characters!!"
          JWT_EXPIRE_MINUTES: "60"
          DEFAULT_ADMIN_PASSWORD: "TestPass123!"
          LOG_LEVEL: "ERROR"
          ALLOWED_ORIGINS: "http://localhost:3000"

  # ── Job 3: Frontend build ──────────────────────────────────────────────────
  frontend-build:
    name: Frontend — Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - run: cd frontend && npm install --legacy-peer-deps

      - name: Vite build
        run: cd frontend && npm run build
        env:
          VITE_API_URL: http://localhost:8000/api
